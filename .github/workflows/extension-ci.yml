name: Extension CI

on:
  push:
    branches:
      - master

jobs:
  build-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace extension --include-workspace-root=false

      - name: Run tests
        working-directory: extension
        run: npm test -- --runInBand

      - name: Run lint
        working-directory: extension
        run: npm run lint

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Package extension
        run: |
          cd extension/dist
          zip -r ../../tabrescue-extension.zip .

      - name: Upload test package artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabrescue-extension-master
          path: tabrescue-extension.zip
          if-no-files-found: error
